<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق المشغل الصوتي الاحترافي</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1f4037 0%, #99f2c8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .player-container {
            background-color: rgba(255, 255, 255, 0.98);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            width: 380px;
            text-align: center;
        }
        h2 {
            margin-top: 0;
            color: #1f4037;
            font-size: 22px;
            margin-bottom: 20px;
            border-bottom: 2px solid #99f2c8;
            padding-bottom: 10px;
        }
        .playlist {
            list-style: none;
            padding: 0;
            margin: 0 0 25px 0;
            max-height: 250px;
            overflow-y: auto;
        }
        .playlist-item {
            padding: 12px 15px;
            margin: 8px 0;
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            font-size: 14px;
            text-align: right;
            display: flex;
            align-items: center;
        }
        .playlist-item:hover {
            background-color: #e2e6ea;
            transform: translateX(-5px);
        }
        .playlist-item.active {
            background-color: #1f4037;
            color: white;
            border-color: #1f4037;
        }
        .playlist-item::before {
            content: "🎵";
            margin-left: 10px;
        }
        .playlist-item.active::before {
            content: "🔊";
        }
        audio {
            width: 100%;
            margin-top: 10px;
            outline: none;
        }
        .now-playing {
            margin-top: 15px;
            font-size: 13px;
            color: #495057;
            font-weight: bold;
            background: #e9ecef;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="player-container">
    <h2>🎵 مشغل الصوتيات الاحترافي</h2>
    
    <ul class="playlist" id="playlist">
        <!-- روابط البث المباشر والنقي لملفاتك الأصلية المرفوعة بدقة -->
        <li class="playlist-item active" data-src="https://res.cloudinary.com/dax66g768/video/upload/v1741285324/AUDIO_6404_scsiv9.mp3">
            1. عفروتو - كبتة (مهرجان تراعي)
        </li>
        <li class="playlist-item" data-src="https://res.cloudinary.com/dax66g768/video/upload/v1741285098/AUDIO_6403_xtxey7.mp3">
            2. بنك مصر - واقف من إيه
        </li>
        <li class="playlist-item" data-src="https://res.cloudinary.com/dax66g768/video/upload/v1741286012/AUDIO_6405_national_z1q2xb.mp3">
            3. أغنية يا بلادي يا أحلى البلاد
        </li>
    </ul>

    <!-- عنصر التشغيل الصوتي الرئيسي بأعلى جودة وثبات -->
    <audio id="audioPlayer" controls>
        <source src="https://res.cloudinary.com/dax66g768/video/upload/v1741285324/AUDIO_6404_scsiv9.mp3" type="audio/mp3">
        متصفحك لا يدعم تشغيل هذا الصوت.
    </audio>

    <div class="now-playing" id="nowPlaying">جاري التشغيل: عفروتو - كبتة (مهرجان تراعي)</div>
</div>

<script>
    const audioPlayer = document.getElementById('audioPlayer');
    const playlistItems = document.querySelectorAll('.playlist-item');
    const nowPlayingText = document.getElementById('nowPlaying');

    playlistItems.forEach(item => {
        item.addEventListener('click', function() {
            playlistItems.forEach(i => i.classList.remove('active'));
            this.classList.add('active');
            
            audioPlayer.src = this.getAttribute('data-src');
            // إجبار المتصفح على إعادة تحميل وتنظيف الذاكرة المؤقتة لمنع أي تقطيع
            audioPlayer.load(); 
            audioPlayer.play().catch(error => {
                console.log("اضغط تشغيل يدوياً إذا طلب المتصفح الإذن");
            });
            
            nowPlayingText.innerText = "جاري التشغيل: " + this.innerText.replace(/^\d+\.\s*/, '').trim();
        });
    });

    // الانتقال التلقائي المستقر للأغنية التالية عند انتهاء الحالية
    audioPlayer.addEventListener('ended', function() {
        let activeIndex = Array.from(playlistItems).findIndex(item => item.classList.contains('active'));
        let nextIndex = (activeIndex + 1) % playlistItems.length;
        playlistItems[nextIndex].click();
    });
</script>

</body>
</html>
