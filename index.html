<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق المشغل الصوتي الوطني</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .player-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        .playlist {
            list-style: none;
            padding: 0;
            margin-bottom: 25px;
        }
        .playlist-item {
            padding: 12px;
            margin: 8px 0;
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            color: #495057;
        }
        .playlist-item:hover {
            background-color: #e2e6ea;
        }
        .playlist-item.active {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }
        audio {
            width: 100%;
            margin-top: 10px;
        }
        .now-playing {
            margin-top: 15px;
            font-size: 0.9em;
            color: #6c757d;
        }
    </style>
</head>
<body>

<div class="player-container">
    <h2>مشغل الملفات الصوتية</h2>
    
    <ul class="playlist" id="playlist">
        <!-- الملف الصوتي الأول -->
        <li class="playlist-item active" data-src="https://res.cloudinary.com/dax66g768/video/upload/v1741285098/AUDIO_6403_xtxey7.mp3">
            1. أغنية بنك مصر (إزاي وازاي)
        </li>
        <!-- الملف الصوتي الثاني -->
        <li class="playlist-item" data-src="https://res.cloudinary.com/dax66g768/video/upload/v1741285324/AUDIO_6404_scsiv9.mp3">
            2. أغنية يا بلادي يا أحلى البلاد
        </li>
    </ul>

    <!-- عنصر التشغيل الصوتي الرئيسي -->
    <audio id="audioPlayer" controls>
        <source src="https://res.cloudinary.com/dax66g768/video/upload/v1741285098/AUDIO_6403_xtxey7.mp3" type="audio/mp3">
        متصفحك لا يدعم تشغيل الملفات الصوتية.
    </audio>

    <div class="now-playing" id="nowPlaying">جاري التشغيل: أغنية بنك مصر (إزاي وازاي)</div>
</div>

<script>
    const audioPlayer = document.getElementById('audioPlayer');
    const playlist = document.getElementById('playlist');
    const playlistItems = document.querySelectorAll('.playlist-item');
    const nowPlayingText = document.getElementById('nowPlaying');

    playlistItems.forEach(item => {
        item.addEventListener('click', function() {
            // إزالة الحالة النشطة من الأغنية السابقة
            playlistItems.forEach(i => i.classList.remove('active'));
            
            // إضافة الحالة النشطة للأغنية المختارة
            this.classList.add('active');
            
            // تغيير مصدر الصوت وتشغيله تلقائياً
            audioPlayer.src = this.getAttribute('data-src');
            audioPlayer.play();
            
            // تحديث نص "جاري التشغيل"
            nowPlayingText.innerText = "جاري التشغيل: " + this.innerText.trim();
        });
    });

    // الانتقال التلقائي للأغنية التالية عند انتهاء الأغنية الحالية
    audioPlayer.addEventListener('ended', function() {
        let activeIndex = Array.from(playlistItems).findIndex(item => item.classList.contains('active'));
        let nextIndex = (activeIndex + 1) % playlistItems.length;
        playlistItems[nextIndex].click();
    });
</script>

</body>
</html>
